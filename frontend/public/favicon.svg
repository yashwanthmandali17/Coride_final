<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF007F" />
      <stop offset="100%" stop-color="#FF8C00" />
    </linearGradient>
    <!-- Drop Shadow for Route Line -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Squircle Background -->
  <rect x="0" y="0" width="128" height="128" rx="36" fill="url(#bgGrad)" />
  
  <!-- Route Line & Points -->
  <g filter="url(#shadow)" fill="none">
    <!-- Curved Route Path -->
    <path d="M 32 96 C 32 48, 96 80, 96 32" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Start point circle -->
    <circle cx="32" cy="96" r="12" fill="#FFFFFF" />
    <!-- End point circle -->
    <circle cx="96" cy="32" r="12" fill="#FFFFFF" />
  </g>
</svg>